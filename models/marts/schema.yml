version: 2

models:
  - name: mart_sales_summary
    description: "Daily sales metrics including revenue, orders and delivery performance"
    columns:
      - name: order_purchase_date
        description: "The date of purchase — unique per row"
        tests:
          - unique
          - not_null
      - name: total_orders
        description: "Total orders placed on this date"
        tests:
          - not_null
      - name: total_revenue
        description: "Total revenue on this date"
        tests:
          - not_null

  - name: mart_customer_orders
    description: "Customer level metrics including lifetime value and segmentation"
    columns:
      - name: customer_unique_id
        description: "Unique customer identifier"
        tests:
          - unique
          - not_null
      - name: customer_segment
        description: "One Time, Returning or Loyal"
        tests:
          - not_null
          - accepted_values:
              values: ['One Time', 'Returning', 'Loyal']
      - name: lifetime_value
        description: "Total amount spent by the customer"
        tests:
          - not_null

  - name: mart_product_performance
    description: "Product level metrics including revenue and review scores"
    columns:
      - name: product_id
        description: "Unique product identifier"
        tests:
          - unique
          - not_null
      - name: total_revenue
        description: "Total revenue generated by this product"
        tests:
          - not_null

  - name: mart_seller_performance
    description: "Seller level metrics including revenue, delivery and review performance"
    columns:
      - name: seller_id
        description: "Unique seller identifier"
        tests:
          - unique
          - not_null
      - name: seller_tier
        description: "Top Seller, Good Seller, Average Seller or Poor Seller"
        tests:
          - not_null
          - accepted_values:
              values: ['Top Seller', 'Good Seller', 'Average Seller', 'Poor Seller']
      - name: on_time_delivery_pct
        description: "Percentage of orders delivered on time"
        tests:
          - not_null

  - name: mart_delivery_analysis
    description: "Order level delivery analysis including speed buckets and delay days"
    columns:
      - name: order_id
        description: "Unique order identifier"
        tests:
          - unique
          - not_null
      - name: delivery_status
        description: "On Time, Late or Pending"
        tests:
          - not_null
          - accepted_values:
              values: ['On Time', 'Late', 'Pending']
      - name: delivery_speed_bucket
        description: "Express, Standard, Slow or Very Slow"
        tests:
          - not_null
          - accepted_values:
              values: ['Express (<=7 days)', 'Standard (8-14 days)', 
                       'Slow (15-30 days)', 'Very Slow (>30 days)']