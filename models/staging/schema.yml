version: 2

models:
  - name: stg_orders
    description: "Cleaned and renamed orders data from Olist"
    columns:
      - name: order_id
        description: "Unique identifier for each order"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Reference to the customer who placed the order"
        tests:
          - not_null
      - name: order_status
        description: "Current status of the order"
        tests:
          - not_null
          - accepted_values:
              values: ['delivered', 'shipped', 'canceled', 'unavailable', 
                       'invoiced', 'processing', 'created', 'approved']

  - name: stg_order_items
    description: "Individual items within each order"
    columns:
      - name: order_id
        description: "Reference to the parent order"
        tests:
          - not_null
      - name: product_id
        description: "Reference to the product"
        tests:
          - not_null
      - name: price
        description: "Price of the item"
        tests:
          - not_null

  - name: stg_customers
    description: "Cleaned customer data"
    columns:
      - name: customer_id
        description: "Unique identifier for each customer"
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        description: "Unique customer across multiple orders"
        tests:
          - not_null

  - name: stg_products
    description: "Cleaned product data with English category names"
    columns:
      - name: product_id
        description: "Unique identifier for each product"
        tests:
          - unique
          - not_null

  - name: stg_sellers
    description: "Cleaned seller data"
    columns:
      - name: seller_id
        description: "Unique identifier for each seller"
        tests:
          - unique
          - not_null

  - name: stg_order_payments
    description: "Payment details for each order"
    columns:
      - name: order_id
        description: "Reference to the parent order"
        tests:
          - not_null
      - name: payment_type
        description: "Method of payment used"
        tests:
          - not_null
          - accepted_values:
              values: ['credit_card', 'boleto', 'voucher', 'debit_card', 'not_defined']

  - name: stg_order_reviews
    description: "Customer reviews and scores"
    columns:
      - name: review_id
        description: "Unique identifier for each review"
        tests:
          - not_null
      - name: review_score
        description: "Score given by customer between 1 and 5"
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5]

  - name: stg_product_category_translations
    description: "Portuguese to English category name translations"
    columns:
      - name: category_name
        description: "Category name in Portuguese"
        tests:
          - unique
          - not_null
      - name: category_name_english
        description: "Category name in English"
        tests:
          - not_null